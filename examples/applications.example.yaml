# Application tracker
# Status: discovered | shortlisted | applied | interview | rejected | withdrawn | offer | closed
# industry: label from config.yaml industry_labels
# resume_fit: strong | good | stretch | weak — separate from industry ★/⚠ flags
# resume_fit_note: one line — why it aligns (or doesn't) with your resume
#
# channel (optional, set when applied): direct | company_site | seek | linkedin | recruiter | referral
# recruiter_id: optional link to data/recruiters.yaml id when placed via recruiter
# resume_status (optional): none | draft | ready — materials prepared but not yet submitted

applications:
